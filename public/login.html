<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PaperBanana — Sign in</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="login-body">
    <main class="login-card">
      <div class="logo">🍌</div>
      <h1>PaperBanana</h1>
      <p class="tag">Academic diagram generator — by Vizuara</p>
      <a class="btn btn-google" href="/auth/google">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.5 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.2 6.2 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16.1 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.2 6.2 29.4 4 24 4 16.3 4 9.6 8.4 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.2C29.3 35 26.8 36 24 36c-5.3 0-9.7-3.4-11.3-8.1l-6.6 5.1C9.5 39.5 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.4-2.3 4.4-4.3 5.8l.1.1 6.3 5.2C39 38.2 44 31.9 44 24c0-1.3-.1-2.4-.4-3.5z"/>
        </svg>
        Sign in with Google
      </a>
      <p class="muted">Access is limited to authorized Vizuara accounts.</p>
      <p id="denied" class="error" hidden>That account is not authorized. Try another Google account.</p>
    </main>
    <script>
      if (new URLSearchParams(location.search).get("denied") === "1") {
        document.getElementById("denied").hidden = false;
      }
    </script>
  </body>
</html>
